name: Publish IP-hiofd to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'IP-hiofd/**'
      - '.github/workflows/publish-ip-hiofd.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build IP-hiofd

      - name: Check package
        run: |
          python -m twine check IP-hiofd/dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN_IP_HIOFD }}
        run: |
          python -m twine upload IP-hiofd/dist/*
