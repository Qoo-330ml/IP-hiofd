name: Publish IP-hiofd to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main
    paths:
      - 'ip_hiofd/**'
      - 'ip_hiofd_api.py'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/publish-ip-hiofd.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN_IP_HIOFD }}
        run: |
          python -m twine upload --skip-existing dist/*
